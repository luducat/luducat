<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="#000000" stroke="none">
  <!-- House / LAN party — home network -->
  <!-- Roof -->
  <polygon points="12,2 2,10 5,10 5,10 19,10 22,10"/>
  <!-- House body -->
  <rect x="5" y="10" width="14" height="10" rx="0.5"/>
  <!-- Door -->
  <rect x="10" y="14" width="4" height="6" rx="0.5" fill="white"/>
  <!-- Window left -->
  <rect x="6.5" y="12" width="3" height="3" rx="0.5" fill="white"/>
  <!-- Network dot on roof (antenna/signal) -->
  <circle cx="12" cy="6.5" r="1.2" fill="white"/>
</svg>
